global:
  toolsImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest

installPlanApproval: Manual

rhoaiChannel: "stable-3.4"
rhoaiVersion: "rhods-operator.3.4.0"
kueue: &kueue "Unmanaged"
trainer: &trainer "Managed"
spark: &spark "Removed"
maas: &maas "Managed"
externalDatabase: true

operatorReplicas: 1
dashboardReplicas: 1

dataScienceClusterInitialization:
  monitoring:
    managementState: Managed
    namespace: redhat-ods-monitoring
    metrics:
      storage:
        size: 5Gi
        retention: 1d

dataScienceCluster:
  create: true

  components:
    sparkoperator:
      managementState: *spark
    kserve:
      managementState: Managed
      modelsAsService:
        managementState: *maas
      nim:
        managementState: Managed
      rawDeploymentServiceConfig: Headed
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries
    feastoperator:
      managementState: Managed
    trustyai:
      managementState: Managed
    aipipelines:
      managementState: Managed
      argoWorkflowsControllers:
        managementState: Managed
    ray:
      managementState: Managed
    kueue:
      defaultClusterQueueName: default
      defaultLocalQueueName: default
      managementState: *kueue
    workbenches:
      managementState: Managed
      workbenchNamespace: rhods-notebooks
    dashboard:
      managementState: Managed
    mlflowoperator:
      managementState: Managed
    trainer:
      managementState: *trainer
    trainingoperator:
      managementState: Removed
    llamastackoperator:
      managementState: Managed

userGroups:
  - system:authenticated

dashboardConfig:
  genAiStudio: true
  modelAsService: true
  observabilityDashboard: true

defaultWorkbenchPvcSize: 20Gi
showJupyterInEnabledApplications: true

modelServerSizes:
  - name: Small
    resources:
      limits:
        cpu: "2"
        memory: 8Gi
      requests:
        cpu: "1"
        memory: 4Gi
  - name: Medium
    resources:
      limits:
        cpu: "8"
        memory: 10Gi
      requests:
        cpu: "4"
        memory: 8Gi
  - name: Large
    resources:
      limits:
        cpu: "10"
        memory: 20Gi
      requests:
        cpu: "6"
        memory: 16Gi

notebookSizes:
  - name: Small
    resources:
      limits:
        cpu: "2"
        memory: 8Gi
      requests:
        cpu: "1"
        memory: 8Gi
  - name: Medium
    resources:
      limits:
        cpu: "6"
        memory: 24Gi
      requests:
        cpu: "3"
        memory: 24Gi
  - name: Large
    resources:
      limits:
        cpu: "14"
        memory: 56Gi
      requests:
        cpu: "7"
        memory: 56Gi
  - name: X Large
    resources:
      limits:
        cpu: "30"
        memory: 120Gi
      requests:
        cpu: "15"
        memory: 120Gi
