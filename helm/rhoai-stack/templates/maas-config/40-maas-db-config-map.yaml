{{- if not (or (eq .Values.maas "Removed") .Values.externalDatabase) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: create-maas-db-config-script
  namespace: maas-db
  annotations:
    argocd.argoproj.io/sync-wave: "40"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
data:
  create-maas-db-config.sh: |-
    {{ .Files.Get "files/create-maas-db-config.sh" | nindent 4 }}
{{- end }}