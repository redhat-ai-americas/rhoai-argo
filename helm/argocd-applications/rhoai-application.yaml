apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-deployment
spec:
  destination:
    name: in-cluster
    namespace: default
  source:
    path: helm/ai-stack
    repoURL: https://github.com/redhat-ai-americas/rhoai-argo.git
    targetRevision: rhoai-3.x
    helm:
      parameters:
        - name: rhoaiChannel
          value: "fast-3.x"
  sources: []
  project: default
  syncPolicy:
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 3
        maxDuration: 30m
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: openshift-gitops
