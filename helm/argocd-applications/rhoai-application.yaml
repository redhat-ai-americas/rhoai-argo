apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-deployment
  namespace: openshift-gitops
spec:
  destination:
    name: in-cluster
    namespace: default
  source:
    path: helm/ai-stack
    repoURL: https://github.com/redhat-ai-americas/rhoai-argo.git
    targetRevision: gpu-app-breakout
    helm:
      parameters:
        - name: rhoaiChannel
          value: "fast-3.x"
        - name: "global.installPlanApproval"
          value: {{ .Values.global.installPlanApproval | default "Manual" }}
  project: default
  syncPolicy:
    automated: {}
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 3
        maxDuration: 30m
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: openshift-gitops