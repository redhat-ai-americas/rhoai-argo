{{- if and .Values.enableInferenceApp .Values.enableObservabilityApp }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inference-stack-operators
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  destination:
    name: in-cluster
    namespace: openshift-gitops
  source:
    path: helm/inference-stack
    repoURL: https://github.com/redhat-ai-americas/rhoai-argo.git
    targetRevision: maas
    helm:
      valuesObject:
        global:
          {{- .Values.global | toYaml | nindent 10 }}
        {{- .Values.configuration.inferenceApp | toYaml | nindent 8 }}
  project: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: false 
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: openshift-gitops
{{- end }}